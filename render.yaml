services:
  - type: web
    name: goatmaster-ml
    env: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ML_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0